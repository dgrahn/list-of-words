name: Deploy PR previews

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: preview-${{ github.ref }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install and Build
        if: github.event.action != 'closed'
        run: |
          npm ci
          PATH_PREFIX=/pr-preview/pr-${{ github.event.number }} npm run build

      - name: Sync preview to build branch
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./dist
          preview-branch: build
          umbrella-dir: pr-preview
          action: auto

      - name: Fetch all (previews + main) for deployment
        if: github.event.action != 'closed'
        run: |
          # Get the full state from the build branch
          git fetch origin build
          mkdir -p deploy-dist
          git --work-tree=deploy-dist checkout origin/build -- .

      - name: Upload artifact
        if: github.event.action != 'closed'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy-dist

      - name: Deploy to GitHub Pages
        if: github.event.action != 'closed'
        id: deployment
        uses: actions/deploy-pages@v4
